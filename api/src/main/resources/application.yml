server:
  port: ${API_PORT}
  servlet:
    context-path: /api

spring:
  application:
    name: ${API_NAME}
  main:
    web-application-type: servlet
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs
          issuer-uri: ${KEYCLOAK_URL}
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD}
  cache:
    type: ${CACHES_TYPE}
    cache-names: ${CACHES_NAME}
  datasource:
    url: jdbc:${DB_TYPE}://${DB_HOST}:${DB_PORT_EXT}/${DB_NAME}
    password: ${DB_PASS}
    user: ${DB_USER}
  hikari:
    connection-timeout: '20000'
    idle-timeout: '10000'
    maximum-pool-size: '40'
    auto-commit: 'true'
    minimum-idle: '10'
  driver-class-name: ${DB_DRIVER}
  liquibase:
    url: jdbc:${DB_TYPE}://${DB_HOST}:${DB_PORT_EXT}/${DB_NAME}
    password: ${DB_PASS}
    user: ${DB_USER}
    enabled: false
    change-log: classpath:db/changelog-master.yml
    parameters:
      sql_user_name_1: ${DB_SQL_USER_NAME_1}
      sql_user_name_2: ${DB_SQL_USER_NAME_2}
  jpa:
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: 'true'
        temp:
          use_jdbc_metadata_defaults: 'false'
    database-platform: ${DB_SQLDIALECT}
    hibernate:
      ddl-auto: none

management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      enabled: true

logging:
  level:
    org:
      springframework:
        security: DEBUG

springdoc:
  swagger-ui:
    csrf:
      enabled: true
  api-docs:
    path: /api-docs

jwt:
  auth:
    converter:
      resource-id: ${KEYCLOAK_NAME}
      principal-attribute: principal_username

keycloak:
  url: ${KEYCLOAK_URL}
  name: ${KEYCLOAK_NAME}
  grant: ${KEYCLOAK_GRANT_TYPE}
  client: ${KEYCLOAK_CLIENT_ID}

ribbon:
  ReadTimeout: '20000'
  ConnectTimeout: '10000'

hystrix:
  command:
    default:
      execution:
        isolation:
          thread:
            timeoutInMilliseconds: '60000'