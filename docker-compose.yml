version: '3.0'

services:
  pg-api:
    container_name: ${DB_CONTAINER_NAME}
    image: ${DB_IMAGE}
    restart: on-failure
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT_EXT}:${DB_PORT_INT}"
    volumes:
      - pg_api_vol:/var/lib/postgresql/data
  # redis:
  #   container_name: ${REDIS_CONTAINER_NAME}
  #   image: ${REDIS_IMAGE}
  #   restart: on-failure
  #   ports:
  #     - "${REDIS_PORT_EXT}:${REDIS_PORT_INT}"
  #   environment:
  #     REDIS_PASSWORD: ${REDIS_PASSWORD}
  # redis-insight:
  #   container_name: ${REDIS_INSIGHT_CONTAINER_NAME}
  #   image: ${REDIS_INSIGHT_IMAGE}
  #   restart: on-failure
  #   ports:
  #     - "${REDIS_INSIGHT_PORT_EXT}:${REDIS_INSIGHT_PORT_INT}"
  #   volumes:
  #     - redis_vol:/data
  pg-keycloak:
    container_name: ${KEYCLOAK_POSTGRES_CONTAINER_NAME}
    image: ${KEYCLOAK_POSTGRES_IMAGE}
    restart: always
    volumes:
      - pg_keycloak_vol:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${KEYCLOAK_POSTGRES_DB}
      POSTGRES_USER: ${KEYCLOAK_POSTGRES_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD}
    networks:
      - brazona_net
  keycloak:
    container_name: ${KEYCLOAK_CONTAINER_NAME}
    image: ${KEYCLOAK_IMAGE}
    command: ${KEYCLOAK_COMMAND}
    restart: always
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${KEYCLOAK_POSTGRES_CONTAINER_NAME}/${KEYCLOAK_POSTGRES_DB}
      KC_DB_USERNAME: ${KEYCLOAK_POSTGRES_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT_EXT}:${KEYCLOAK_PORT_INT}"
    depends_on:
      - pg-keycloak
    networks:
      - brazona_net

volumes:
  pg_keycloak_vol:
  pg_api_vol:
  # redis_vol:
networks:
  brazona_net:
    driver: bridge